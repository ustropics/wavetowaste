<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florida Sea Turtle Nesting Beaches</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:           #0f1923;
    --bg-alpha:     rgba(15, 25, 35, 0.93);
    --text:         #e8edf2;
    --text-dim:     #7a8fa3;
    --accent:       #38b2ac;
    --accent-dim:   rgba(56, 178, 172, 0.18);
    --fallback:     #f97316;
    --line:         rgba(255,255,255,0.07);
    --shadow:       0 4px 24px rgba(0,0,0,0.45);
    --radius:       12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0a0f14; color: var(--text);
    overflow: hidden; height: 100vh; width: 100vw;
  }
  #map { position: absolute; inset: 0; z-index: 1; }

  /* ── side panel ── */
  #panel {
    position: absolute; top: 16px; left: 16px; z-index: 1000;
    background: var(--bg-alpha);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius);
    width: 300px; box-shadow: var(--shadow);
    display: flex; flex-direction: column;
    max-height: calc(100vh - 32px);
  }
  #panel-header {
    padding: 14px 18px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none; flex-shrink: 0;
  }
  #panel-header:hover { background: rgba(255,255,255,0.03); border-radius: var(--radius) var(--radius) 0 0; }
  .panel-title { font-size: 13px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; color: var(--text-dim); }
  .panel-count { font-size: 11px; background: var(--accent-dim); color: var(--accent);
    padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  #panel-body { overflow-y: auto; flex: 1; }
  #panel.collapsed #panel-body { display: none; }
  #panel.collapsed { width: auto; }

  /* stats row */
  #stats {
    padding: 12px 18px; border-bottom: 1px solid var(--line);
    display: flex; gap: 18px; flex-shrink: 0;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-size: 20px; font-weight: 700; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .4px; }

  /* search */
  #search-wrap {
    padding: 10px 14px; border-bottom: 1px solid var(--line); flex-shrink: 0;
  }
  #search {
    width: 100%; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    color: var(--text); font-family: inherit; font-size: 13px;
    padding: 7px 12px; outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-dim); }

  /* beach list */
  #beach-list { padding: 6px 0; }
  .beach-item {
    padding: 9px 18px; cursor: pointer; transition: background .12s;
    border-left: 3px solid transparent;
    display: flex; flex-direction: column; gap: 2px;
  }
  .beach-item:hover { background: rgba(255,255,255,0.04); }
  .beach-item.active {
    background: var(--accent-dim);
    border-left-color: var(--accent);
  }
  .beach-name { font-size: 13px; font-weight: 500; }
  .beach-county { font-size: 11px; color: var(--text-dim); }

  /* ── download buttons (top right) ── */
  #dl-bar {
    position: absolute; top: 16px; right: 16px; z-index: 1000;
    display: flex; gap: 8px;
  }
  .dl-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-alpha);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.10); border-radius: 8px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 8px 14px; cursor: pointer;
    box-shadow: var(--shadow); transition: background .15s, border-color .15s;
    text-decoration: none;
  }
  .dl-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
  .dl-btn svg { flex-shrink: 0; }

  /* info card (bottom right) */
  #info-card {
    position: absolute; bottom: 24px; right: 16px; z-index: 1000;
    background: var(--bg-alpha);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius);
    width: 280px; box-shadow: var(--shadow);
    padding: 16px 18px; display: none;
  }
  #info-card.visible { display: block; }
  #info-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  #info-county { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .4px; }
  .coord-row { display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; padding: 4px 0; border-bottom: 1px solid var(--line); }
  .coord-row:last-child { border: none; }
  .coord-lbl { color: var(--text-dim); }
  .coord-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); }
  #info-close {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 6px;
  }
  #info-close:hover { color: var(--text); }
</style>
</head>
<body>

<div id="map"></div>

<!-- side panel -->
<div id="panel">
  <div id="panel-header" onclick="togglePanel()">
    <span class="panel-title">Nesting Beaches</span>
    <span class="panel-count" id="list-count">216</span>
  </div>
  <div id="panel-body">
    <div id="stats">
      <div class="stat">
        <span class="stat-val">216</span>
        <span class="stat-lbl">Total</span>
      </div>
      <div class="stat">
        <span class="stat-val" style="color:var(--accent)">145</span>
        <span class="stat-lbl">Coastline</span>
      </div>
      <div class="stat">
        <span class="stat-val" style="color:var(--fallback)">71</span>
        <span class="stat-lbl">Shapefile</span>
      </div>
    </div>
    <div style="padding:0 18px 10px;font-size:11px;color:var(--text-dim);line-height:1.5">
      <span style="color:var(--accent)">&#9644;</span> ne_10m_coastline &nbsp;
      <span style="color:var(--fallback)">&#9644;</span> beach shapefile geometry
    </div>
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Search beaches…" oninput="filterList(this.value)">
    </div>
    <div id="beach-list"></div>
  </div>
</div>

<!-- download buttons -->
<div id="dl-bar">
  <button class="dl-btn" onclick="downloadCSV()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Download CSV
  </button>
  <button class="dl-btn" onclick="downloadShapefile()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Download Shapefile
  </button>
</div>

<!-- info card -->
<div id="info-card">
  <button id="info-close" onclick="closeInfo()">✕</button>
  <div id="info-name"></div>
  <div id="info-county"></div>
  <div class="coord-row">
    <span class="coord-lbl">Start</span>
    <span class="coord-val" id="info-start"></span>
  </div>
  <div class="coord-row">
    <span class="coord-lbl">End</span>
    <span class="coord-val" id="info-end"></span>
  </div>
  <div class="coord-row">
    <span class="coord-lbl">Points</span>
    <span class="coord-val" id="info-pts"></span>
  </div>
  <div class="coord-row">
    <span class="coord-lbl">Source</span>
    <span class="coord-val" id="info-source"></span>
  </div>
</div>

L.control.zoom({ position: 'bottomleft' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  maxZoom: 19,
}).addTo(map);

// ── Draw lines ────────────────────────────────────────────────────────────
function normalStyle(b) {
  return b.source === 'shapefile'
    ? { color: '#f97316', weight: 3, opacity: 0.85 }
    : { color: '#38b2ac', weight: 3, opacity: 0.85 };
}
function hoverStyle(b) {
  return b.source === 'shapefile'
    ? { color: '#fdba74', weight: 5, opacity: 1 }
    : { color: '#81e6d9', weight: 5, opacity: 1 };
}
const ACTIVE_STYLE = { color: '#fbbf24', weight: 5, opacity: 1 };

let activeIndex = null;
const layers = [];

BEACHES.forEach((b, i) => {
  const line = L.polyline(b.coords, normalStyle(b)).addTo(map);
  line.on('mouseover', () => { if (i !== activeIndex) line.setStyle(hoverStyle(b)); });
  line.on('mouseout',  () => { if (i !== activeIndex) line.setStyle(normalStyle(b)); });
  line.on('click', () => selectBeach(i));
  layers.push(line);
});

// ── Selection ─────────────────────────────────────────────────────────────
function selectBeach(i) {
  if (activeIndex !== null) {
    layers[activeIndex].setStyle(normalStyle(BEACHES[activeIndex]));
    document.querySelectorAll('.beach-item')[activeIndex]?.classList.remove('active');
  }
  activeIndex = i;
  const b = BEACHES[i];
  layers[i].setStyle(ACTIVE_STYLE);

  const items = document.querySelectorAll('.beach-item');
  items[i]?.classList.add('active');
  items[i]?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  document.getElementById('info-name').textContent   = b.beach;
  document.getElementById('info-county').textContent = b.county ? b.county + ' County' : '';
  document.getElementById('info-start').textContent  = `${b.start_lat.toFixed(5)}, ${b.start_lon.toFixed(5)}`;
  document.getElementById('info-end').textContent    = `${b.end_lat.toFixed(5)}, ${b.end_lon.toFixed(5)}`;
  document.getElementById('info-pts').textContent    = b.n_coords;
  const srcEl = document.getElementById('info-source');
  srcEl.textContent = b.source === 'shapefile' ? 'beach shapefile' : 'ne_10m_coastline';
  srcEl.style.color = b.source === 'shapefile' ? '#f97316' : '#38b2ac';
  document.getElementById('info-card').classList.add('visible');

  map.fitBounds(layers[i].getBounds(), { padding: [60, 60], maxZoom: 13 });
}

function closeInfo() {
  if (activeIndex !== null) {
    layers[activeIndex].setStyle(normalStyle(BEACHES[activeIndex]));
    document.querySelectorAll('.beach-item')[activeIndex]?.classList.remove('active');
    activeIndex = null;
  }
  document.getElementById('info-card').classList.remove('visible');
}

// ── Sidebar list ──────────────────────────────────────────────────────────
const listEl = document.getElementById('beach-list');

function buildList(filter) {
  listEl.innerHTML = '';
  let shown = 0;
  BEACHES.forEach((b, i) => {
    if (filter && !b.beach.toLowerCase().includes(filter.toLowerCase())) return;
    shown++;
    const div = document.createElement('div');
    div.className = 'beach-item' + (i === activeIndex ? ' active' : '');
    div.innerHTML = `<span class="beach-name">${b.beach}</span>`
                  + (b.county ? `<span class="beach-county">${b.county} County</span>` : '');
    div.addEventListener('click', () => selectBeach(i));
    listEl.appendChild(div);
  });
  document.getElementById('list-count').textContent = shown;
}
function filterList(val) { buildList(val); }
buildList('');

// ── Panel toggle ──────────────────────────────────────────────────────────
function togglePanel() {
  document.getElementById('panel').classList.toggle('collapsed');
}

map.on('click', () => closeInfo());

// ── Downloads ─────────────────────────────────────────────────────────────
function triggerDownload(href, filename) {
  const a = document.createElement('a');
  a.href = href; a.download = filename;
  a.click();
}

function downloadCSV() {
  const header = 'beach,county,source,start_lat,start_lon,end_lat,end_lon,n_coords';
  const rows = BEACHES.map(b => [
    `"${b.beach.replace(/"/g,'""')}"`,
    `"${(b.county||'').replace(/"/g,'""')}"`,
    b.source,
    b.start_lat, b.start_lon,
    b.end_lat,   b.end_lon,
    b.n_coords,
  ].join(','));
  const csv = [header, ...rows].join('\n');
  triggerDownload('data:text/csv;charset=utf-8,' + encodeURIComponent(csv),
                  'florida_nesting_beaches.csv');
}

function downloadShapefile() {
  const bytes = atob(SHP_B64);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  const blob = new Blob([arr], { type: 'application/zip' });
  triggerDownload(URL.createObjectURL(blob), 'florida_nesting_beaches.zip');
}
</script>
